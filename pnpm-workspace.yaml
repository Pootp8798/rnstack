packages:
  - "apps/*"
  - "packages/*"

# react-native-css (NativeWind v5) binds to lightningcss; tailwindcss pulls a
# newer 1.32.x that crashes the RN CSS compiler ("failed to deserialize Specifier").
# Pin a single version across the workspace.
# https://www.nativewind.dev/v5/getting-started/installation#5-override-the-lightningcss-version
overrides:
  lightningcss: "1.30.1"
